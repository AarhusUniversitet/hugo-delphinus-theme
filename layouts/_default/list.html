{{ define "main" }}
<article>
    <header>
        <h1 data-pagefind-meta="title">{{ .Title }}</h1>
        {{ partial "byline.html" . }}
    </header>

    {{ .Content }}

{{ if .Pages }}
    <h2>Subpages</h2>
    <ul>
        {{ range .Pages }}
        <li><a href="{{ .RelPermalink }}">{{ .Title }}</a></li>
        {{ end }}
    </ul>
    {{ end }}
</article>
{{ end }}
